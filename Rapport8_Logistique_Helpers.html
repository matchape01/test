<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantramour 2026 — Rapport 8 · Infos Logistiques Helpers</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f8fa; --border: #e5e7eb;
    --text: #1f2328; --muted: #57606a; --accent: #3b82d4;
    --header-bg: #f0f4fb;
    --h-bg: #e0f2fe; --h-border: #7dd3fc; --h-accent: #0284c7;
    --tag-bg: #eef2ff; --tag-text: #3b5bdb;
    --note-bg: #fffbeb; --note-border: #fcd34d; --note-text: #92400e;
    --log-bg: #f0fdf4; --log-border: #86efac; --log-text: #166534;
    --row-alt: #f7f8fa;
    --badge-f: #dcfce7; --badge-ft: #166534;
    --badge-h: #e0f2fe; --badge-ht: #0369a1;
    --badge-a: #fce7f3; --badge-at: #9d174d;
  }
  .dark {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --header-bg: #1c2333;
    --h-bg: #0c2d48; --h-border: #1e4d7b; --h-accent: #38bdf8;
    --tag-bg: #1c2a4a; --tag-text: #79a8ff;
    --note-bg: #1c1500; --note-border: #92400e; --note-text: #fcd34d;
    --log-bg: #052e16; --log-border: #166534; --log-text: #4ade80;
    --row-alt: #161b22;
    --badge-f: #0a2e1a; --badge-ft: #4ade80;
    --badge-h: #0c2d48; --badge-ht: #58a6ff;
    --badge-a: #3b1030; --badge-at: #f0abca;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Segoe UI",system-ui,sans-serif; font-size: 14px; line-height: 1.6; background: var(--bg); color: var(--text); transition: background .2s, color .2s; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .logo h1 { font-size: 20px; font-weight: 700; }
  .logo p  { font-size: 28px; font-weight: 800; color: var(--h-accent); letter-spacing: .3px; line-height: 1.2; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-ghost { cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 13px; color: var(--text); font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-ghost:hover { background: var(--border); }

  /* ── RÉSUMÉ ── */
  .summary { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
  .sum-card { flex: 1; min-width: 130px; border-radius: 10px; padding: 14px 18px; border: 1px solid var(--h-border); background: var(--h-bg); }
  .sum-num   { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px; color: var(--h-accent); }
  .sum-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }

  /* ── FILTRES ── */
  .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; }
  select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; color: var(--text); font-family: inherit; min-width: 200px; cursor: pointer; }
  .stats { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .stats span { color: var(--h-accent); font-weight: 600; }

  /* ── BLOC HELPER ── */
  .helper-section { display: flex; flex-direction: column; gap: 28px; }
  .helper-block { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

  .helper-header {
    background: var(--h-bg); border-bottom: 1px solid var(--h-border);
    padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .helper-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--h-accent); color: #fff;
    font-size: 16px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .helper-name  { font-size: 18px; font-weight: 800; color: var(--text); }
  .helper-badge { display: inline-block; background: var(--h-accent); color: #fff; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }
  .helper-meta  { margin-left: auto; font-size: 12px; color: var(--muted); text-align: right; }
  .helper-meta strong { color: var(--h-accent); font-size: 15px; }

  /* ── GROUPE JOUR ── */
  .day-group { border-bottom: 1px solid var(--border); }
  .day-group:last-child { border-bottom: none; }
  .day-header {
    padding: 10px 20px; background: var(--accent);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .day-label { font-size: 13px; font-weight: 800; color: #fff; letter-spacing: .3px; }
  .day-date  { font-size: 12px; color: rgba(255,255,255,.8); }
  .day-count { margin-left: auto; font-size: 11px; background: rgba(255,255,255,.2); color: #fff; border-radius: 999px; padding: 2px 9px; font-weight: 600; }

  /* ── FICHE ATELIER ── */
  .atelier-card { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .atelier-card:last-child { border-bottom: none; }
  .atelier-card:nth-child(even) { background: var(--row-alt); }

  .atelier-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .atelier-heure { font-size: 13px; font-weight: 800; color: var(--h-accent); white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 140px; padding-top: 2px; }
  .atelier-titre { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
  .atelier-meta  { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; padding-left: 152px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-left: 152px; }
  .info-block { display: flex; flex-direction: column; gap: 3px; }
  .info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .info-value { font-size: 13px; color: var(--text); display: flex; flex-wrap: wrap; gap: 4px; }

  /* ── BOÎTES NOTE & LOGISTIQUE ── */
  .boxes { padding-left: 152px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .box { border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 1.55; }
  .box-note { background: var(--note-bg); border: 1px solid var(--note-border); color: var(--note-text); }
  .box-log  { background: var(--log-bg);  border: 1px solid var(--log-border);  color: var(--log-text); }
  .box-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; opacity: .75; margin-bottom: 4px; }

  /* ── SHARED ── */
  .pill { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .pill-f { background: var(--badge-f); color: var(--badge-ft); }
  .pill-h { background: var(--badge-h); color: var(--badge-ht); }
  .pill-a { background: var(--badge-a); color: var(--badge-at); }
  .tag    { display: inline-block; background: var(--tag-bg); color: var(--tag-text); border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .tag-lieu { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; }

  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; border: 2px dashed var(--border); border-radius: 10px; }

  footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--muted); }

  @media (max-width: 640px) {
    .atelier-meta, .info-grid, .boxes { padding-left: 0; }
    .info-grid { grid-template-columns: 1fr; }
    .atelier-top { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <h1>Tantramour 2026</h1>
      <p>Rapport 8 — Infos Logistiques Helpers</p>
    </div>
    <div class="header-actions">
      <a class="btn-ghost" href="index.html">🏠 Home</a>
      <button class="btn-ghost" onclick="hardReload()">🔄 Refresh</button>
      <button class="btn-ghost" id="modeBtn" onclick="toggleMode()">🌙 Mode Nuit</button>
    </div>
  </header>

  <!-- ── RÉSUMÉ ── -->
  <div class="summary">
    <div class="sum-card"><div class="sum-num" id="sumHelpers">—</div><div class="sum-label">Helpers</div></div>
    <div class="sum-card"><div class="sum-num" id="sumAteliers">—</div><div class="sum-label">Ateliers assignés</div></div>
    <div class="sum-card"><div class="sum-num" id="sumLogistic">—</div><div class="sum-label">Avec infos logistiques</div></div>
    <div class="sum-card"><div class="sum-num" id="sumNote">—</div><div class="sum-label">Avec note spéciale</div></div>
  </div>

  <!-- ── FILTRES ── -->
  <div class="filters">
    <div class="filter-group">
      <label>Helper</label>
      <select id="filterHelper" onchange="render()">
        <option value="">Tous les helpers</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Jour</label>
      <select id="filterJour" onchange="render()">
        <option value="">Tous les jours</option>
        <option value="Jour 1">Jour 1 — Sam. 29 août</option>
        <option value="Jour 2">Jour 2 — Dim. 30 août</option>
        <option value="Jour 3">Jour 3 — Lun. 31 août</option>
        <option value="Jour 4">Jour 4 — Mar. 1 sept.</option>
        <option value="Jour 5">Jour 5 — Mer. 2 sept.</option>
        <option value="Jour 6">Jour 6 — Jeu. 3 sept.</option>
        <option value="Jour 7">Jour 7 — Ven. 4 sept.</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Infos logistiques</label>
      <select id="filterLog" onchange="render()">
        <option value="">Tous</option>
        <option value="log">Avec infos logistiques</option>
        <option value="note">Avec note spéciale</option>
      </select>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div id="results"></div>

</div>
<footer><p>Made with IBM Bob</p></footer>

<script src="ref_helpers.js"></script>
<script src="loader.js"></script>
<script>
loadData(['logistics.js','data.js'], function() {

// ════════════════════════════════════════════════
// UTILITAIRES
// ════════════════════════════════════════════════
function heureEnMinutes(h) {
  if (!h) return 9999;
  const norm = h.replace(/\./g, ':');
  const m = norm.match(/(\d{1,2}):(\d{2})/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 9999;
}

function initiales(nom) {
  return nom.split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

function pill(v, cls) { return v ? `<span class="pill ${cls}">${v}</span>` : ''; }
function pills(vs, cls) { return vs.filter(Boolean).map(v => pill(v, cls)).join(''); }

// ════════════════════════════════════════════════
// CONSTRUCTION DES DONNÉES PAR HELPER
// ════════════════════════════════════════════════
const JOUR_ORDER = ['Jour 1','Jour 2','Jour 3','Jour 4','Jour 5','Jour 6','Jour 7'];

function construire() {
  const parHelper = new Map(); // nom → Map(jour → [atelier entry])

  AGENDA.forEach(e => {
    ['helper1','helper2','helper3'].forEach(field => {
      const nom = e[field];
      if (!nom) return;
      if (!parHelper.has(nom)) parHelper.set(nom, new Map());
      const parJour = parHelper.get(nom);
      if (!parJour.has(e.jour)) parJour.set(e.jour, []);
      parJour.get(e.jour).push(e);
    });
  });

  // Construire la liste finale triée
  const result = [];
  parHelper.forEach((parJour, nom) => {
    const jours = JOUR_ORDER
      .filter(j => parJour.has(j))
      .map(j => ({
        jour: j,
        date: parJour.get(j)[0].date,
        ateliers: parJour.get(j).slice().sort((a,b) => heureEnMinutes(a.heure) - heureEnMinutes(b.heure))
      }));
    result.push({ nom, jours });
  });

  result.sort((a,b) => a.nom.localeCompare(b.nom, 'fr'));
  return result;
}

const DATA = construire();

// ── Compteurs globaux ──
const totalAteliers = DATA.reduce((s,h) => s + h.jours.reduce((ss,j) => ss + j.ateliers.length, 0), 0);
function getLogEntry(e) {
  return (e.logisticId && typeof LOGISTICS !== 'undefined') ? (LOGISTICS[e.logisticId] || null) : null;
}
const totalLog  = DATA.reduce((s,h) => s + h.jours.reduce((ss,j) => ss + j.ateliers.filter(a => getLogEntry(a)).length, 0), 0);
const totalNote = DATA.reduce((s,h) => s + h.jours.reduce((ss,j) => ss + j.ateliers.filter(a => a.note && a.note.trim()).length, 0), 0);

document.getElementById('sumHelpers').textContent  = DATA.length;
document.getElementById('sumAteliers').textContent = totalAteliers;
document.getElementById('sumLogistic').textContent = totalLog;
document.getElementById('sumNote').textContent     = totalNote;

// ── Peupler filtre Helper — toutes les entrées de REF_HELPERS ──
const selH = document.getElementById('filterHelper');
const nomsAvecAteliers = new Set(DATA.map(h => h.nom));
REF_HELPERS.forEach(ref => {
  const o = document.createElement('option');
  o.value = ref.value;
  o.text  = nomsAvecAteliers.has(ref.value) ? ref.value : `${ref.value} (aucun atelier)`;
  selH.appendChild(o);
});

// ════════════════════════════════════════════════
// RENDU
// ════════════════════════════════════════════════
function renderAtelier(e) {
  const facs    = pills([e.fac1, e.fac2], 'pill-f');
  const coHelpers = pills(
    ['helper1','helper2','helper3'].map(f => e[f]).filter(Boolean),
    'pill-h'
  );
  const angel = pill(e.angel, 'pill-a');
  const logEntry = getLogEntry(e);
  const hasLog   = !!logEntry;
  const hasNote = e.note && e.note.trim();

  const boxNote = hasNote
    ? `<div class="box box-note"><div class="box-label">📌 Note spéciale</div>${e.note}</div>`
    : '';
  const boxLog = hasLog
    ? `<div class="box box-log"><div class="box-label">🔧 Informations logistiques</div>${logEntry.html || logEntry.text.replace(/\n/g,'<br>')}</div>`
    : '';

  return `<div class="atelier-card">
    <div class="atelier-top">
      <div class="atelier-heure">${e.heure || '—'}</div>
      <div class="atelier-titre">${e.atelier || '—'}</div>
    </div>
    <div class="atelier-meta">
      ${e.type ? `<span class="tag">${e.type}</span>` : ''}
      ${e.lieu ? `<span class="tag-lieu">📍 ${e.lieu}</span>` : ''}
    </div>
    <div class="info-grid">
      <div class="info-block">
        <div class="info-label">Facilitateur(s)</div>
        <div class="info-value">${facs || '<span style="color:var(--muted)">—</span>'}</div>
      </div>
      <div class="info-block">
        <div class="info-label">Co-Helper(s)</div>
        <div class="info-value">${coHelpers || '<span style="color:var(--muted)">—</span>'}</div>
      </div>
      ${angel ? `<div class="info-block">
        <div class="info-label">Angel</div>
        <div class="info-value">${angel}</div>
      </div>` : ''}
    </div>
    ${boxNote || boxLog ? `<div class="boxes">${boxNote}${boxLog}</div>` : ''}
  </div>`;
}

function render() {
  const fh  = document.getElementById('filterHelper').value;
  const fj  = document.getElementById('filterJour').value;
  const fl  = document.getElementById('filterLog').value;

  let data = DATA
    .filter(h => !fh || h.nom === fh)
    .map(h => ({
      ...h,
      jours: h.jours
        .filter(j => !fj || j.jour === fj)
        .map(j => ({
          ...j,
          ateliers: j.ateliers.filter(e => {
            if (fl === 'log')  return !!getLogEntry(e);
            if (fl === 'note') return e.note && e.note.trim();
            return true;
          })
        }))
        .filter(j => j.ateliers.length > 0)
    }))
    .filter(h => h.jours.length > 0);

  const nbAteliers = data.reduce((s,h) => s + h.jours.reduce((ss,j) => ss + j.ateliers.length, 0), 0);
  document.getElementById('stats').innerHTML =
    `<span>${data.length}</span> helper${data.length>1?'s':''} · <span>${nbAteliers}</span> atelier${nbAteliers>1?'s':''}`;

  if (!data.length) {
    document.getElementById('results').innerHTML = `<div class="empty">Aucun résultat pour cette sélection.</div>`;
    return;
  }

  document.getElementById('results').innerHTML = `<div class="helper-section">${
    data.map(h => {
      const nbA = h.jours.reduce((s,j) => s + j.ateliers.length, 0);
      const joursHtml = h.jours.map(j => `
        <div class="day-group">
          <div class="day-header">
            <span class="day-label">${j.jour}</span>
            <span class="day-date">${j.date}</span>
            <span class="day-count">${j.ateliers.length} atelier${j.ateliers.length>1?'s':''}</span>
          </div>
          ${j.ateliers.map(e => renderAtelier(e)).join('')}
        </div>`).join('');

      return `<div class="helper-block">
        <div class="helper-header">
          <div class="helper-avatar">${initiales(h.nom)}</div>
          <div>
            <div class="helper-name">${h.nom}</div>
            <span class="helper-badge">🤝 Helper</span>
          </div>
          <div class="helper-meta">
            <strong>${nbA}</strong> atelier${nbA>1?'s':''}<br>
            <span>${h.jours.length} jour${h.jours.length>1?'s':''}</span>
          </div>
        </div>
        ${joursHtml}
      </div>`;
    }).join('')
  }</div>`;
}

function hardReload() {
  if ('caches' in window) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
      .finally(() => location.reload(true));
  } else {
    location.reload(true);
  }
}

function toggleMode() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('modeBtn').textContent = isDark ? '☀️ Mode Jour' : '🌙 Mode Nuit';
}

render();

// Auto-refresh si ouvert depuis Home (paramètre ?v= présent)
if (location.search.includes('v=') && !sessionStorage.getItem('_refreshed_' + location.pathname)) {
  sessionStorage.setItem('_refreshed_' + location.pathname, '1');
  hardReload();
}

}); // fin loadData
</script>
</body>
</html>
